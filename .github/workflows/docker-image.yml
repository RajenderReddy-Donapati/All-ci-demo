name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/all-demo .

    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/all-demo

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker stop all-ci-demo || true
            docker rm all-ci-demo || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/all-demo
            docker run -d --name all-ci-demo -p 80:8080 ${{ secrets.DOCKER_USERNAME }}/all-demo
        











